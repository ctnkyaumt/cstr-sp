name: CloudStream Builder

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "**/*.md"
      - "**/*.yml"
      - "**/*.jpg"
      - "**/*.png"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Create builds directory
        run: |
          mkdir -p $GITHUB_WORKSPACE/builds
          cd $GITHUB_WORKSPACE/builds
          git init
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git branch -M builds
          git remote add origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull origin builds || true
          rm *.cs3 || true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson --no-daemon
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds/ || true
          cp build/plugins.json $GITHUB_WORKSPACE/builds/ || true
          cp repo.json $GITHUB_WORKSPACE/builds/ || true

      - name: Replace USERNAME in repo.json
        run: |
          cd $GITHUB_WORKSPACE/builds
          sed -i "s/USERNAME/${{ github.repository_owner }}/g" repo.json

      - name: Commit and Push
        run: |
          cd $GITHUB_WORKSPACE/builds
          git add .
          git commit -m "Build $GITHUB_SHA" || exit 0
          git push -u origin builds --force
